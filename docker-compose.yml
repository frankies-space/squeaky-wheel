services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: squeaky
      POSTGRES_PASSWORD: squeaky
      POSTGRES_DB: squeaky_wheel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U squeaky -d squeaky_wheel']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
